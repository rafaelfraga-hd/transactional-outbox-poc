version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: transactional-outbox-postgres
    environment:
      POSTGRES_DB: outboxdb
      POSTGRES_USER: outboxuser
      POSTGRES_PASSWORD: outboxpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: